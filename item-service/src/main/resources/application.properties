server.port=8083

spring.application.name=ITEM-SERVICE

# MongoDB
spring.data.mongodb.uri=mongodb+srv://admin:1234@item-service-db.arz1iut.mongodb.net/item-service-db
spring.data.mongodb.database=Lost-and-found-system

# Config Server
spring.config.import=optional:configserver:http://localhost:8000

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# GCS  <-- REPLACE these two values with your real GCP project info
gcs.bucket-name=lostandfoundsystem
gcs.project-id=project-b4041733-aa31-4fce-9f9

# File upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


